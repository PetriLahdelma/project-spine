name: npm dist-tags

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published project-spine version to promote, for example 0.9.2-beta.0."
        required: true
        type: string

permissions: {}

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Verify NPM_TOKEN secret is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set."
            exit 1
          fi

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*-beta.*) ;;
            *)
              echo "::error::version must be a published beta version, got '$VERSION'"
              exit 1
              ;;
          esac

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Promote public dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          npm dist-tag add "project-spine@${VERSION}" latest
          npm dist-tag add "project-spine@${VERSION}" next
          npm dist-tag add "project-spine@${VERSION}" beta
          npm view project-spine dist-tags --json
